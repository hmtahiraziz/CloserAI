services:
  postgres:
    image: postgres:16-alpine
    container_name: closerai-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: closerai
      POSTGRES_PASSWORD: closerai
      POSTGRES_DB: closerai
    volumes:
      - closerai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U closerai -d closerai"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  closerai_pgdata:
